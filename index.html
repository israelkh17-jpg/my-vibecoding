<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동북고 수업 메모장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 엑셀 다운로드 및 업로드를 위한 SheetJS 라이브러리 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="./styles.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA5eHVCK10DSzzN_zgP7Pfi143k_7kJdyQ",
            authDomain: "vibecoding-exe.firebaseapp.com",
            projectId: "vibecoding-exe",
            storageBucket: "vibecoding-exe.firebasestorage.app",
            messagingSenderId: "318705619437",
            appId: "1:318705619437:web:7fa6afce34fe50ccce17e4",
            measurementId: "G-X4S0TNNFQK",
            databaseURL: "https://vibecoding-exe-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.ref = ref;
        window.set = set;
        window.get = get;
        window.remove = remove;
    </script>
</head>
<body class="min-h-screen pb-16 sm:pb-12">

    <!-- 네비게이션 바 -->
    <nav class="bg-white shadow-sm sticky top-0 z-10 border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
            <h1 class="text-base sm:text-xl font-bold text-blue-600 leading-tight">
                강현식의 수업 메모장
            </h1>
            <!-- 데스크탑 전용 버튼 -->
            <div class="hidden sm:flex gap-1.5 items-center">
                <button onclick="switchTab('input')" id="tab-input" class="px-3 py-1.5 sm:py-2 rounded-lg font-semibold text-sm whitespace-nowrap shrink-0 bg-blue-600 text-white transition-all">
                    기록하기
                </button>
                <button onclick="switchTab('list')" id="tab-list" class="px-3 py-1.5 sm:py-2 rounded-lg font-semibold text-sm whitespace-nowrap shrink-0 text-slate-600 hover:bg-slate-100 transition-all">
                    조회하기
                </button>
                <button onclick="openSisuModal()" class="px-3 py-2 rounded-lg font-semibold text-sm whitespace-nowrap shrink-0 bg-emerald-500 hover:bg-emerald-600 text-white transition-all shadow-sm">
                    📊 수업시수 확인
                </button>
                <button onclick="openAbsenceModal()" class="px-3 py-2 rounded-lg font-semibold text-sm whitespace-nowrap shrink-0 bg-rose-500 hover:bg-rose-600 text-white transition-all shadow-sm">
                    🗒️ 결석 체크
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-3 sm:px-4 mt-4 sm:mt-8">

        <!-- 입력 섹션 -->
        <section id="input-section" class="fade-in space-y-3 sm:space-y-6">

            <!-- 기본 정보 카드 -->
            <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 border border-slate-200">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">기본 수업 정보</h2>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">날짜</label>
                        <input type="date" id="date" onchange="handleDateChange()" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">과목</label>
                        <select id="subject" onchange="handleSubjectChange()" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            <option value="">과목 선택</option>
                            <option value="물리학2">물리학2</option>
                            <option value="통합과학">통합과학</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">반</label>
                        <select id="class-group" onchange="handleClassChange()" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            <option value="">과목 먼저 선택</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">교시</label>
                        <select id="period" readonly class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-slate-50">
                            <option value="">교시 선택</option>
                            <option value="1">1교시</option>
                            <option value="2">2교시</option>
                            <option value="3">3교시</option>
                            <option value="4">4교시</option>
                            <option value="5">5교시</option>
                            <option value="6">6교시</option>
                            <option value="7">7교시</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 수업 내용 카드 -->
            <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 border border-slate-200">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">수업 상세 내용</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">수업 진도</label>
                        <input type="text" id="lesson-progress" placeholder="오늘 나간 진도를 입력하세요" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">특기사항</label>
                        <textarea id="general-note" rows="3" placeholder="수업 분위기나 공지사항 등" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"></textarea>
                    </div>
                </div>
            </div>

            <!-- 학생별 특기사항 카드 -->
            <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">학생 개별 특기사항</h2>
                        <button id="btn-search-student" onclick="openStudentSearch()" disabled class="disabled:opacity-50 disabled:cursor-not-allowed text-xs whitespace-nowrap shrink-0 bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors font-semibold">
                            학생 선택
                        </button>
                    </div>
                    <button onclick="addStudentRow()" class="text-sm whitespace-nowrap shrink-0 text-blue-600 hover:text-blue-800 font-semibold flex items-center gap-1">
                        <span class="text-lg leading-none">+</span> 직접 추가
                    </button>
                </div>

                <div id="student-list" class="space-y-3">
                    <!-- 학생 입력 줄이 여기에 추가됨 -->
                </div>
            </div>

            <button onclick="saveMemo()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2 text-base">
                <span>💾</span> 저장하기
            </button>

        </section>

        <!-- 조회 섹션 -->
        <section id="list-section" class="hidden fade-in space-y-4">
            <div class="flex flex-col gap-2 sm:flex-row sm:justify-between sm:items-center mb-2">
                <div class="flex items-center gap-2 flex-wrap">
                    <h2 class="text-base font-bold text-slate-700">저장된 기록 목록</h2>
                    <button onclick="openClassNotesView()" id="btn-view-class-notes" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                        반별 특기사항
                    </button>
                </div>
                <div class="flex gap-2">
                    <button onclick="downloadExcel()" id="btn-download" class="flex-1 sm:flex-none bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition-all shadow-sm">
                        <span>📊</span> 학생 기록
                    </button>
                    <button onclick="downloadGeneralNotesExcel()" id="btn-download-general" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition-all shadow-sm">
                        <span>📋</span> 특기사항
                    </button>
                </div>
            </div>

            <div id="memo-container" class="space-y-4">
                <!-- 저장된 메모 카드가 여기에 표시됨 -->
            </div>
            <div id="empty-state" class="hidden py-20 text-center bg-white rounded-xl border border-slate-200 shadow-sm">
                <p class="text-slate-400">저장된 수업 기록이 없습니다.</p>
            </div>
        </section>

    </main>

    <!-- 모바일 하단 탭바 -->
    <nav class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-20">
        <div class="grid grid-cols-4">
            <button onclick="switchTab('input')" id="bottom-tab-input" class="btm-tab active">
                <span class="text-xl">✏️</span>
                <span>기록</span>
            </button>
            <button onclick="switchTab('list')" id="bottom-tab-list" class="btm-tab">
                <span class="text-xl">📋</span>
                <span>조회</span>
            </button>
            <button onclick="openSisuModal()" class="btm-tab">
                <span class="text-xl">📊</span>
                <span>수업시수</span>
            </button>
            <button onclick="openAbsenceModal()" class="btm-tab">
                <span class="text-xl">🗒️</span>
                <span>결석</span>
            </button>
        </div>
    </nav>

    <!-- 학생 선택 모달 -->
    <div id="student-search-modal" class="modal">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-[500px] max-w-[95%] max-h-[80vh] flex flex-col fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold" id="search-modal-title">학생 선택</h3>
                <button onclick="closeModal('student-search-modal')" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div class="mb-4">
                <input type="text" id="student-filter" oninput="filterStudentList()" placeholder="이름 또는 학번 검색..." class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div id="search-results" class="flex-1 overflow-y-auto custom-scrollbar space-y-1">
                <!-- 검색 결과 버튼들 -->
            </div>
            <div class="mt-4 text-xs text-slate-400 text-center">
                이미 추가된 학생은 목록에 표시되지 않습니다.
            </div>
        </div>
    </div>

    <!-- 반별 특기사항 조회 모달 -->
    <div id="class-notes-modal" class="modal">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-[800px] max-w-[95%] max-h-[85vh] flex flex-col fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">반별 특기사항 조회</h3>
                <button onclick="closeModal('class-notes-modal')" class="text-slate-400 hover:text-slate-600">✕</button>
            </div>
            <div class="mb-4">
                <label for="class-notes-filter" class="block text-sm font-medium text-slate-700 mb-1">반 선택</label>
                <select id="class-notes-filter" onchange="filterClassNotesView()" class="w-full md:w-64 px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <option value="">전체 반</option>
                </select>
            </div>
            <div id="class-notes-content" class="flex-1 overflow-y-auto custom-scrollbar space-y-4">
                <!-- 반별 특기사항 카드 -->
            </div>
        </div>
    </div>

    <!-- 결석 체크 모달 -->
    <div id="absence-modal" class="modal" onclick="closeAbsenceOnBackdrop(event)">
        <div class="bg-white rounded-2xl shadow-xl w-[760px] max-w-[95%] max-h-[90vh] flex flex-col fade-in" onclick="event.stopPropagation()">

            <!-- 모달 헤더 -->
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-200 shrink-0">
                <h3 class="text-lg font-bold text-slate-700">🗒️ 결석 체크</h3>
                <button onclick="closeAbsenceModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button>
            </div>

            <!-- 기본 정보 입력 -->
            <div class="px-6 pt-5 pb-4 border-b border-slate-100 shrink-0">
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">📅 날짜</label>
                        <input type="date" id="abs-date" onchange="absDateChange()" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-rose-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">📘 과목</label>
                        <select id="abs-subject" onchange="absSubjectChange()" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-rose-400">
                            <option value="">과목 선택</option>
                            <option value="물리학2">물리학2</option>
                            <option value="통합과학">통합과학</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">👥 반</label>
                        <select id="abs-class" onchange="absClassChange()" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-rose-400">
                            <option value="">반 선택</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">⏰ 교시</label>
                        <select id="abs-period" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-rose-400">
                            <option value="">교시 선택</option>
                            <option value="1">1교시</option>
                            <option value="2">2교시</option>
                            <option value="3">3교시</option>
                            <option value="4">4교시</option>
                            <option value="5">5교시</option>
                            <option value="6">6교시</option>
                            <option value="7">7교시</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 학생 목록 -->
            <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-4">
                <div id="abs-empty-msg" class="py-16 text-center text-slate-400 text-sm">
                    과목과 반을 선택하면 학생 목록이 표시됩니다.
                </div>
                <div id="abs-student-table" class="hidden">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">학생 목록</span>
                        <span id="abs-absence-count" class="text-xs font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded-full"></span>
                    </div>
                    <!-- 헤더 -->
                    <div class="grid grid-cols-[80px_1fr_repeat(5,56px)] gap-x-1 px-3 py-2 bg-slate-50 rounded-lg mb-1 text-center">
                        <span class="text-xs font-semibold text-slate-500 text-left">학번</span>
                        <span class="text-xs font-semibold text-slate-500 text-left">이름</span>
                        <span class="text-xs font-semibold text-slate-500">정상</span>
                        <span class="text-xs font-semibold text-rose-400">결석</span>
                        <span class="text-xs font-semibold text-amber-400">지각</span>
                        <span class="text-xs font-semibold text-purple-400">조퇴</span>
                        <span class="text-xs font-semibold text-blue-400">공결</span>
                    </div>
                    <div id="abs-rows" class="space-y-1"></div>
                </div>
            </div>

            <!-- 하단 버튼 -->
            <div class="px-6 py-4 border-t border-slate-100 flex justify-between items-center shrink-0">
                <span id="abs-save-info" class="text-xs text-slate-400"></span>
                <div class="flex gap-2">
                    <button onclick="absReset()" class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-semibold hover:bg-slate-50 transition-all">
                        초기화
                    </button>
                    <button onclick="openAbsenceReview()" class="px-4 py-2 rounded-lg border border-indigo-200 bg-indigo-50 text-indigo-600 text-sm font-semibold hover:bg-indigo-100 transition-all">
                        📋 조회하기
                    </button>
                    <button onclick="absenceSave()" class="px-6 py-2 rounded-lg bg-rose-500 hover:bg-rose-600 text-white text-sm font-bold transition-all shadow-sm">
                        💾 저장하기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 결석 현황 조회 모달 -->
    <div id="absence-review-modal" class="modal" onclick="closeAbsenceReviewOnBackdrop(event)">
        <div class="bg-white rounded-2xl shadow-xl w-[820px] max-w-[95%] max-h-[90vh] flex flex-col fade-in" onclick="event.stopPropagation()">

            <!-- 헤더 -->
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-200 shrink-0">
                <h3 class="text-lg font-bold text-slate-700">📋 결석 현황 조회</h3>
                <button onclick="closeAbsenceReview()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button>
            </div>

            <!-- 필터 -->
            <div class="px-6 pt-4 pb-3 border-b border-slate-100 shrink-0">
                <div class="flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">📘 과목 필터</label>
                        <select id="rev-subject" onchange="absReviewRender()" class="px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                            <option value="">전체 과목</option>
                            <option value="물리학2">물리학2</option>
                            <option value="통합과학">통합과학</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">👥 반 필터</label>
                        <select id="rev-class" onchange="absReviewRender()" class="px-3 py-2 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                            <option value="">전체 반</option>
                        </select>
                    </div>
                    <button onclick="absReviewLoad()" class="px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-bold transition-all">
                        🔄 새로고침
                    </button>
                    <span id="rev-total-badge" class="text-xs text-slate-400 font-semibold ml-auto self-center"></span>
                </div>
            </div>

            <!-- 내용 -->
            <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-4">
                <div id="rev-loading" class="hidden py-16 text-center text-slate-400 text-sm">불러오는 중...</div>
                <div id="rev-empty" class="hidden py-16 text-center text-slate-400 text-sm">조회된 이상 출결 기록이 없습니다.</div>
                <div id="rev-content" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- 수업시수 확인 모달 -->
    <div id="sisu-modal" class="modal" onclick="closeSisuOnBackdrop(event)">
        <div class="bg-white rounded-2xl shadow-xl w-[860px] max-w-[95%] max-h-[90vh] flex flex-col fade-in" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-200">
                <h3 class="text-lg font-bold text-slate-700">📊 수업 시수 확인</h3>
                <button onclick="closeSisuModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button>
            </div>
            <iframe src="./sisu.html" class="flex-1 rounded-b-2xl" style="border:none; min-height:640px;"></iframe>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium opacity-0 transition-opacity pointer-events-none z-50">
        저장되었습니다.
    </div>

    <script>
        /* ── 결석 체크 모달 ── */
        function openAbsenceModal() {
            // 오늘 날짜 자동 설정
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            document.getElementById('abs-date').value = new Date(today - offset).toISOString().split('T')[0];
            document.getElementById('absence-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeAbsenceModal() {
            document.getElementById('absence-modal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function closeAbsenceOnBackdrop(e) {
            if (e.target === document.getElementById('absence-modal')) closeAbsenceModal();
        }

        function absDateChange() {
            // 날짜 변경 시 과목·반·교시 초기화
            document.getElementById('abs-subject').value = '';
            document.getElementById('abs-class').innerHTML = '<option value="">반 선택</option>';
            document.getElementById('abs-period').innerHTML = '<option value="">교시 선택</option>';
            absHideTable();
        }

        function absGetCurrentDay() {
            const dateVal = document.getElementById('abs-date').value;
            if (!dateVal) return null;
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return days[new Date(dateVal).getDay()];
        }

        function absSubjectChange() {
            const subject = document.getElementById('abs-subject').value;
            const classSelect = document.getElementById('abs-class');
            const periodSelect = document.getElementById('abs-period');
            classSelect.innerHTML = '<option value="">반 선택</option>';
            periodSelect.innerHTML = '<option value="">교시 선택</option>';
            absHideTable();

            if (!subject) return;

            const day = absGetCurrentDay();
            const sched = window.schedule;

            // 해당 날짜 요일의 시간표에서 과목에 맞는 반만 필터링
            if (day && sched && sched[day] && sched[day][subject]) {
                const classes = Object.keys(sched[day][subject]).sort();
                classes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    classSelect.appendChild(opt);
                });
            } else {
                // 날짜 미선택이거나 해당 요일에 수업 없음
                const noOpt = document.createElement('option');
                noOpt.value = '';
                noOpt.textContent = day ? '해당 날짜에 수업 없음' : '날짜를 먼저 선택하세요';
                noOpt.disabled = true;
                classSelect.appendChild(noOpt);
            }
        }

        function absClassChange() {
            const subject = document.getElementById('abs-subject').value;
            const cls = document.getElementById('abs-class').value;
            const periodSelect = document.getElementById('abs-period');

            // 교시 자동 설정
            periodSelect.innerHTML = '';
            const day = absGetCurrentDay();
            const sched = window.schedule;
            if (day && sched && sched[day] && sched[day][subject] && sched[day][subject][cls]) {
                const period = sched[day][subject][cls];
                const opt = document.createElement('option');
                opt.value = period;
                opt.textContent = `${period}교시`;
                periodSelect.appendChild(opt);
                periodSelect.value = period;
            } else {
                periodSelect.innerHTML = '<option value="">교시 선택</option>';
                for (let i = 1; i <= 7; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${i}교시`;
                    periodSelect.appendChild(opt);
                }
            }

            if (!subject || !cls) { absHideTable(); return; }
            absRenderTable(subject, cls);
        }

        function absHideTable() {
            document.getElementById('abs-empty-msg').classList.remove('hidden');
            document.getElementById('abs-student-table').classList.add('hidden');
            document.getElementById('abs-save-info').textContent = '';
        }

        function absRenderTable(subject, cls) {
            const classStudents = (window.students || [])
                .filter(s => s.subject === subject && s.class === cls)
                .sort((a, b) => a.id.localeCompare(b.id));

            const rowsEl = document.getElementById('abs-rows');
            rowsEl.innerHTML = '';

            const statusTypes = [
                { value: 'normal',  label: '정상', color: 'text-slate-600' },
                { value: 'absent',  label: '결석', color: 'text-rose-500' },
                { value: 'late',    label: '지각', color: 'text-amber-500' },
                { value: 'early',   label: '조퇴', color: 'text-purple-500' },
                { value: 'official',label: '공결', color: 'text-blue-500' },
            ];

            classStudents.forEach(student => {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-[80px_1fr_repeat(5,56px)] gap-x-1 px-3 py-2 rounded-lg hover:bg-slate-50 items-center text-center transition-colors';
                row.dataset.id = student.id;

                const radios = statusTypes.map(st => `
                    <label class="flex justify-center items-center cursor-pointer">
                        <input type="radio" name="abs_${student.id}" value="${st.value}"
                            ${st.value === 'normal' ? 'checked' : ''}
                            onchange="absUpdateCount()"
                            class="w-4 h-4 accent-rose-500 cursor-pointer">
                    </label>
                `).join('');

                row.innerHTML = `
                    <span class="text-xs text-slate-500 text-left font-mono">${student.id}</span>
                    <span class="text-sm font-semibold text-slate-700 text-left">${student.name}</span>
                    ${radios}
                `;
                rowsEl.appendChild(row);
            });

            document.getElementById('abs-empty-msg').classList.add('hidden');
            document.getElementById('abs-student-table').classList.remove('hidden');
            absUpdateCount();
        }

        function absUpdateCount() {
            const nonNormal = document.querySelectorAll('#abs-rows input[type=radio]:not([value=normal]):checked');
            const total = document.querySelectorAll('#abs-rows input[type=radio][value=normal]').length;
            const count = nonNormal.length;
            const el = document.getElementById('abs-absence-count');
            if (count === 0) {
                el.textContent = `전원 정상 (${total}명)`;
                el.className = 'text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-full';
            } else {
                el.textContent = `이상 ${count}명 / 전체 ${total}명`;
                el.className = 'text-xs font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded-full';
            }
        }

        function absReset() {
            document.querySelectorAll('#abs-rows input[type=radio][value=normal]').forEach(r => {
                r.checked = true;
            });
            absUpdateCount();
        }

        async function absenceSave() {
            const date    = document.getElementById('abs-date').value;
            const subject = document.getElementById('abs-subject').value;
            const cls     = document.getElementById('abs-class').value;
            const period  = document.getElementById('abs-period').value;

            if (!date || !subject || !cls || !period) {
                alert('날짜, 과목, 반, 교시를 모두 선택해주세요.');
                return;
            }
            if (document.getElementById('abs-student-table').classList.contains('hidden')) {
                alert('학생 목록을 먼저 불러오세요.');
                return;
            }

            const labelMap = { normal: '정상', absent: '결석', late: '지각', early: '조퇴', official: '공결' };
            const records = {};
            document.querySelectorAll('#abs-rows > div').forEach(row => {
                const id = row.dataset.id;
                const checked = row.querySelector(`input[name="abs_${id}"]:checked`);
                records[id] = checked ? checked.value : 'normal';
            });

            const key = `${date}_${subject}_${cls}_${period}교시`.replace(/\s/g, '_');
            const saveData = { date, subject, class: cls, period, records, savedAt: new Date().toISOString() };

            try {
                if (window.db && window.ref && window.set) {
                    await window.set(window.ref(window.db, `absences/${key}`), saveData);
                }
                const infoEl = document.getElementById('abs-save-info');
                infoEl.textContent = `✅ ${date} ${subject} ${cls} ${period}교시 저장 완료`;
                infoEl.className = 'text-xs text-emerald-600 font-semibold';
            } catch (e) {
                console.error(e);
                alert('저장 중 오류가 발생했습니다.');
            }
        }

        /* ── 결석 현황 조회 모달 ── */
        let absReviewData = {}; // Firebase에서 받아온 원본 데이터

        const absLabelMap  = { absent: '결석', late: '지각', early: '조퇴', official: '공결' };
        const absBadgeClass = {
            absent:   'bg-rose-100 text-rose-600',
            late:     'bg-amber-100 text-amber-600',
            early:    'bg-purple-100 text-purple-600',
            official: 'bg-blue-100 text-blue-600',
        };

        async function openAbsenceReview() {
            document.getElementById('absence-review-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            await absReviewLoad();
        }

        function closeAbsenceReview() {
            document.getElementById('absence-review-modal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function closeAbsenceReviewOnBackdrop(e) {
            if (e.target === document.getElementById('absence-review-modal')) closeAbsenceReview();
        }

        async function absReviewLoad() {
            const loadEl   = document.getElementById('rev-loading');
            const emptyEl  = document.getElementById('rev-empty');
            const contentEl = document.getElementById('rev-content');

            loadEl.classList.remove('hidden');
            emptyEl.classList.add('hidden');
            contentEl.innerHTML = '';
            document.getElementById('rev-total-badge').textContent = '';

            try {
                const snap = await window.get(window.ref(window.db, 'absences'));
                absReviewData = snap.exists() ? snap.val() : {};
            } catch (e) {
                console.error(e);
                absReviewData = {};
            }

            loadEl.classList.add('hidden');

            // 반 필터 옵션 채우기
            const revClassSel = document.getElementById('rev-class');
            const curClass = revClassSel.value;
            revClassSel.innerHTML = '<option value="">전체 반</option>';
            const allClasses = [...new Set(Object.values(absReviewData).map(r => r.class))].sort();
            allClasses.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                revClassSel.appendChild(opt);
            });
            if (allClasses.includes(curClass)) revClassSel.value = curClass;

            absReviewRender();
        }

        function absReviewRender() {
            const filterSubject = document.getElementById('rev-subject').value;
            const filterClass   = document.getElementById('rev-class').value;
            const contentEl     = document.getElementById('rev-content');
            const emptyEl       = document.getElementById('rev-empty');
            contentEl.innerHTML = '';

            // 필터 + 비정상 학생만 추출 (fbKey 포함)
            const entries = Object.entries(absReviewData)
                .filter(([, r]) => (!filterSubject || r.subject === filterSubject)
                                && (!filterClass   || r.class   === filterClass))
                .map(([fbKey, r]) => {
                    const nonNormal = Object.entries(r.records || {})
                        .filter(([, status]) => status !== 'normal')
                        .map(([id, status]) => {
                            const stu = (window.students || []).find(s => s.id === id);
                            return { id, name: stu ? stu.name : id, status };
                        });
                    return { ...r, fbKey, nonNormal };
                })
                .filter(r => r.nonNormal.length > 0)
                .sort((a, b) => b.date.localeCompare(a.date)); // 최신순

            if (entries.length === 0) {
                emptyEl.classList.remove('hidden');
                document.getElementById('rev-total-badge').textContent = '';
                return;
            }
            emptyEl.classList.add('hidden');

            // 날짜별 그룹핑
            const byDate = {};
            entries.forEach(r => {
                if (!byDate[r.date]) byDate[r.date] = [];
                byDate[r.date].push(r);
            });

            let totalStudents = 0;
            Object.keys(byDate).sort((a, b) => b.localeCompare(a)).forEach(date => {
                const group = byDate[date];
                const dayNames = ['일','월','화','수','목','금','토'];
                const d = new Date(date);
                const dayLabel = dayNames[d.getDay()];

                const section = document.createElement('div');
                section.className = 'bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm';

                // 날짜 헤더
                const header = document.createElement('div');
                header.className = 'flex items-center gap-3 px-4 py-3 bg-slate-50 border-b border-slate-200';
                const dayCount = group.reduce((sum, r) => sum + r.nonNormal.length, 0);
                totalStudents += dayCount;
                header.innerHTML = `
                    <span class="font-bold text-slate-700">${date} (${dayLabel})</span>
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-rose-100 text-rose-600">${dayCount}건</span>
                `;
                section.appendChild(header);

                // 수업별 행
                group.sort((a, b) => Number(a.period) - Number(b.period)).forEach(r => {
                    const block = document.createElement('div');
                    block.className = 'px-4 py-3 border-b border-slate-100 last:border-0';

                    const stuBadges = r.nonNormal.map(s => `
                        <span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-lg ${absBadgeClass[s.status] || 'bg-slate-100 text-slate-600'}">
                            ${s.name}
                            <span class="opacity-70">${absLabelMap[s.status] || s.status}</span>
                        </span>
                    `).join('');

                    const safeKey = r.fbKey.replace(/'/g, "\\'");
                    const label = `${r.date} ${r.subject} ${r.class} ${r.period}교시`;
                    block.innerHTML = `
                        <div class="flex items-start gap-3 flex-wrap">
                            <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-lg whitespace-nowrap shrink-0">${r.subject} ${r.class} ${r.period}교시</span>
                            <div class="flex flex-wrap gap-1.5 flex-1">${stuBadges}</div>
                            <button onclick="absDeleteRecord('${safeKey}', '${label}')"
                                class="shrink-0 text-xs text-slate-400 hover:text-rose-500 hover:bg-rose-50 px-2 py-1 rounded-lg transition-colors border border-transparent hover:border-rose-200">
                                🗑 삭제
                            </button>
                        </div>
                    `;
                    section.appendChild(block);
                });

                contentEl.appendChild(section);
            });

            document.getElementById('rev-total-badge').textContent = `총 ${totalStudents}건`;
        }

        async function absDeleteRecord(fbKey, label) {
            if (!confirm(`다음 기록을 삭제하시겠습니까?\n\n${label}`)) return;
            try {
                await window.remove(window.ref(window.db, `absences/${fbKey}`));
                delete absReviewData[fbKey];
                absReviewRender();
            } catch (e) {
                console.error(e);
                alert('삭제 중 오류가 발생했습니다.');
            }
        }

        /* ── 수업시수 모달 ── */
        function openSisuModal() {
            document.getElementById('sisu-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeSisuModal() {
            document.getElementById('sisu-modal').style.display = 'none';
            document.body.style.overflow = '';
        }
        function closeSisuOnBackdrop(e) {
            if (e.target === document.getElementById('sisu-modal')) closeSisuModal();
        }
    </script>
